<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — RwandaGuide</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      box-shadow: var(--shadow); width: 100%; max-width: 420px; padding: 2.5rem; }
    .auth-logo { text-align: center; margin-bottom: 1.5rem; }
    .auth-logo a { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--green); text-decoration: none; }
    .auth-logo a span { color: var(--gold); }
    .auth-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; text-align: center; margin-bottom: .3rem; }
    .auth-sub { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 1.8rem; }
    .divider-text { text-align: center; color: var(--muted); font-size: 13px; margin: 1rem 0; position: relative; }
    .divider-text::before, .divider-text::after {
      content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border);
    }
    .divider-text::before { left: 0; } .divider-text::after { right: 0; }
    .forgot { float: right; font-size: 13px; color: var(--green); text-decoration: none; }
    .forgot:hover { text-decoration: underline; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 14px; color: var(--muted); }
    .auth-footer a { color: var(--green); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" href="../index.html">🌿 Rwanda<span>Guide</span></a>
  <div class="nav-links">
    <a href="search.html">Explore Guides</a>
    <a href="register.html" class="btn btn-primary btn-sm">Sign Up</a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><a href="../index.html">🌿 Rwanda<span>Guide</span></a></div>
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Log in to your account</div>

    <div class="alert alert-error" id="errorMsg" style="display:none;"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password <a href="forgot-password.html" class="forgot">Forgot password?</a></label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:.5rem;">Log In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Sign up free</a>
    </div>
    <div class="auth-footer" style="margin-top:.5rem;">
      Are you a guide? <a href="register.html?role=guide">Register as a guide</a>
    </div>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.textContent = 'Logging in…'; btn.disabled = true;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
      const res = await fetch('/api/v1/auth/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Login failed');
      localStorage.setItem('accessToken', data.data?.token || '');
      const role = data.data?.user?.role;
      location.href = role === 'guide' ? 'guide-dashboard.html' : 'my-bookings.html';
    } catch(err) {
      const el = document.getElementById('errorMsg');
      el.textContent = err.message; el.style.display = 'block';
      btn.textContent = 'Log In'; btn.disabled = false;
    }
  });
</script>
</body>
</html>
