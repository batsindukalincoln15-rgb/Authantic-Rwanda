<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find a Guide — RwandaGuide</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .search-bar-wrap { background: var(--green); padding: 1.5rem 0; }
    .search-bar { display:flex; gap:10px; align-items:center; }
    .search-bar input { flex:1; padding:11px 14px; border:none; border-radius:var(--radius);
      font-size:15px; font-family:inherit; outline:none; }
    .filter-sidebar { position: sticky; top: 80px; }
    .filter-section { margin-bottom: 1.4rem; }
    .filter-label { font-size:13px; font-weight:600; color:var(--text); margin-bottom:.6rem; display:block; }
    .filter-option { display:flex; align-items:center; gap:8px; margin-bottom:.5rem; font-size:14px; cursor:pointer; }
    .filter-option input { accent-color: var(--green); width:15px; height:15px; }
    .price-range { display:flex; gap:8px; }
    .price-range input { width:100%; }
    .results-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.2rem; }
    .results-count { font-size:14px; color:var(--muted); }
    .sort-select { border:1.5px solid var(--border); border-radius:var(--radius); padding:7px 12px;
      font-size:13px; font-family:inherit; background:var(--surface); cursor:pointer; }
    .guide-list { display:flex; flex-direction:column; gap:1rem; }
    .guide-row { display:flex; gap:1.2rem; padding:1.2rem; background:var(--surface);
      border:1px solid var(--border); border-radius:var(--radius); transition:box-shadow .2s; }
    .guide-row:hover { box-shadow:var(--shadow); }
    .guide-row-avatar { width:88px; height:88px; border-radius:10px; background:linear-gradient(135deg,#d4e8d8,#c8e0d0);
      display:flex; align-items:center; justify-content:center; font-size:2.5rem; flex-shrink:0; }
    .guide-row-body { flex:1; }
    .guide-row-actions { display:flex; flex-direction:column; gap:8px; align-items:flex-end; justify-content:center; }
    .guide-row-price { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:var(--green); }
    .guide-row-price small { font-family:'DM Sans',sans-serif; font-size:12px; color:var(--muted); font-weight:400; }
    .tags { display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; }
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" href="../index.html">🌿 Rwanda<span>Guide</span></a>
  <div class="nav-links">
    <a href="search.html" class="active">Explore Guides</a>
    <a href="login.html">Log In</a>
    <a href="register.html" class="btn btn-primary btn-sm">Sign Up</a>
  </div>
</nav>

<div class="search-bar-wrap">
  <div class="container">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by location, specialisation, language…" value="" />
      <button class="btn btn-gold" onclick="doSearch()">Search</button>
    </div>
  </div>
</div>

<div class="container" style="padding-top:2rem; padding-bottom:3rem;">
  <div class="layout-sidebar">

    <!-- FILTER SIDEBAR -->
    <aside class="filter-sidebar card card-body">
      <div style="font-weight:600; margin-bottom:1rem;">Filters</div>

      <div class="filter-section">
        <span class="filter-label">Location</span>
        <label class="filter-option"><input type="checkbox" value="kigali" /> Kigali</label>
        <label class="filter-option"><input type="checkbox" value="volcanoes" /> Volcanoes NP</label>
        <label class="filter-option"><input type="checkbox" value="nyungwe" /> Nyungwe Forest</label>
        <label class="filter-option"><input type="checkbox" value="lake-kivu" /> Lake Kivu</label>
        <label class="filter-option"><input type="checkbox" value="akagera" /> Akagera NP</label>
      </div>

      <hr class="divider" />

      <div class="filter-section">
        <span class="filter-label">Specialisation</span>
        <label class="filter-option"><input type="checkbox" value="wildlife" /> Wildlife & Gorillas</label>
        <label class="filter-option"><input type="checkbox" value="culture" /> Culture & History</label>
        <label class="filter-option"><input type="checkbox" value="hiking" /> Hiking & Nature</label>
        <label class="filter-option"><input type="checkbox" value="city" /> City Tours</label>
        <label class="filter-option"><input type="checkbox" value="food" /> Food & Cuisine</label>
      </div>

      <hr class="divider" />

      <div class="filter-section">
        <span class="filter-label">Language</span>
        <label class="filter-option"><input type="checkbox" value="en" /> English</label>
        <label class="filter-option"><input type="checkbox" value="fr" /> French</label>
        <label class="filter-option"><input type="checkbox" value="rw" /> Kinyarwanda</label>
        <label class="filter-option"><input type="checkbox" value="sw" /> Swahili</label>
      </div>

      <hr class="divider" />

      <div class="filter-section">
        <span class="filter-label">Price Range (USD/hr)</span>
        <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;">
          <span>$0</span><span id="priceVal">$100</span>
        </div>
        <input type="range" min="0" max="200" value="100" style="width:100%; accent-color:var(--green);"
          oninput="document.getElementById('priceVal').textContent='$'+this.value" />
      </div>

      <hr class="divider" />

      <div class="filter-section">
        <span class="filter-label">Minimum Rating</span>
        <label class="filter-option"><input type="radio" name="rating" value="4.5" /> ★★★★★ 4.5+</label>
        <label class="filter-option"><input type="radio" name="rating" value="4.0" /> ★★★★☆ 4.0+</label>
        <label class="filter-option"><input type="radio" name="rating" value="3.0" /> ★★★☆☆ 3.0+</label>
      </div>

      <button class="btn btn-primary" style="width:100%;" onclick="doSearch()">Apply Filters</button>
      <button class="btn btn-ghost" style="width:100%;margin-top:8px;" onclick="clearFilters()">Clear All</button>
    </aside>

    <!-- RESULTS -->
    <div>
      <div class="results-header">
        <span class="results-count" id="resultsCount">Showing 6 guides</span>
        <select class="sort-select" id="sortBy">
          <option value="rating">Sort: Top Rated</option>
          <option value="price_asc">Sort: Price Low → High</option>
          <option value="price_desc">Sort: Price High → Low</option>
          <option value="bookings">Sort: Most Booked</option>
        </select>
      </div>

      <div class="guide-list" id="guideList">
        <!-- Guide rows rendered by JS -->
      </div>

      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<footer><div class="container"><div class="footer-inner">
  <div class="brand">🌿 RwandaGuide</div>
  <div>© 2025 Rwanda Tourist Experience Platform</div>
</div></div></footer>

<script>
const guides = [
  { name:'Jean-Pierre Habimana', location:'Volcanoes NP', rating:5.0, reviews:48, price:45, tags:['Wildlife','Gorilla Trekking'], langs:'English, Kinyarwanda', emoji:'🧑🏾' },
  { name:'Claudine Uwase', location:'Kigali', rating:4.9, reviews:62, price:35, tags:['City Tours','History'], langs:'English, French', emoji:'👩🏾' },
  { name:'Emmanuel Nkurunziza', location:'Nyungwe', rating:4.8, reviews:29, price:40, tags:['Hiking','Canopy Walk'], langs:'English, Kinyarwanda', emoji:'🧑🏾‍🦱' },
  { name:'Agathe Mukamana', location:'Lake Kivu', rating:4.7, reviews:35, price:30, tags:['Culture','Food Tours'], langs:'French, Kinyarwanda', emoji:'👩🏾‍🦱' },
  { name:'Patrick Nsabimana', location:'Akagera NP', rating:4.9, reviews:17, price:55, tags:['Wildlife','Photography'], langs:'English, French', emoji:'🧔🏾' },
  { name:'Marie-Claire Ingabire', location:'Kigali', rating:4.6, reviews:44, price:28, tags:['City Tours','Genocide Memorial'], langs:'English, French, Kinyarwanda', emoji:'👩🏾‍💼' },
];

function stars(r) {
  return '★'.repeat(Math.floor(r)) + (r%1>=.5?'½':'') + ' ' + r.toFixed(1);
}

function renderGuides() {
  const list = document.getElementById('guideList');
  list.innerHTML = guides.map((g,i) => `
    <div class="guide-row">
      <div class="guide-row-avatar">${g.emoji}</div>
      <div class="guide-row-body">
        <div style="font-family:'Playfair Display',serif;font-size:17px;font-weight:600;">${g.name}</div>
        <div style="color:var(--muted);font-size:13px;margin-top:2px;">📍 ${g.location} &nbsp;·&nbsp; 🗣 ${g.langs}</div>
        <div style="margin-top:4px;font-size:13px;color:var(--gold);">${stars(g.rating)} <span style="color:var(--muted);">(${g.reviews} reviews)</span></div>
        <div class="tags">${g.tags.map(t=>`<span class="badge badge-green">${t}</span>`).join('')}</div>
      </div>
      <div class="guide-row-actions">
        <div class="guide-row-price">$${g.price}<small>/hr</small></div>
        <a href="guide-profile.html" class="btn btn-ghost btn-sm">View Profile</a>
        <a href="booking.html" class="btn btn-primary btn-sm">Book Now</a>
      </div>
    </div>
  `).join('');
  document.getElementById('resultsCount').textContent = `Showing ${guides.length} guides`;
}

function doSearch() {}
function clearFilters() { document.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false); }

renderGuides();
</script>
</body>
</html>
